name: Track EASYGE holdings

on:
  schedule:
    # Poll a few times daily to catch newly published source files quickly.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-plot:
    runs-on: ubuntu-latest
    concurrency:
      group: easyge-data-update
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest EASYGE holdings
        run: python scripts/fetch_easyge.py

      - name: Generate charts
        run: python scripts/plot_easyge.py

      - name: Commit updated data and charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data charts
          git commit -m "Update EASYGE holdings ($(date -u +%Y-%m-%dT%H:%M:%SZ))" || echo "No changes to commit"
          git push
