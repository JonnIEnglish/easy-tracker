name: Monthly EASYGE report

on:
  schedule:
    - cron: "0 8 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build monthly report
        run: python -m scripts.build_report
      - name: Send report email
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_FROM: ${{ secrets.REPORT_FROM }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: python -m scripts.send_report
      - name: Commit report archive
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add reports
          git commit -m "Archive monthly EASYGE report" || echo "No changes to commit"
          git pull --rebase || true
          git push
