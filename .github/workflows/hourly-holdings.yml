name: Hourly holdings capture

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: holdings-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit_changes.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest
      - name: Fetch holdings CSVs
        run: python -m scripts.fetch_holdings
      - name: Capture NAV observations
        run: python -m scripts.fetch_nav
      - name: Build site data
        run: python -m scripts.build_site_data
      - name: Commit captured data
        id: commit_changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data site
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Capture latest EasyETFs holdings"
          git pull --rebase || true
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Upload Pages artifact
        if: steps.commit_changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: capture
    if: needs.capture.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
