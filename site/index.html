<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EasyETFs Holdings Tracker</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #647282;
      --line: #dde3ea;
      --accent: #0f766e;
      --accent-soft: #d9f0ed;
      --good: #0a7a3d;
      --bad: #b42318;
      --warn: #8a5a00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }
    .wrap {
      width: min(1280px, calc(100vw - 32px));
      margin: 0 auto;
    }
    .topbar {
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: 0;
    }
    .subtle { color: var(--muted); }
    .timestamp {
      text-align: right;
      line-height: 1.5;
      white-space: nowrap;
    }
    main { padding: 20px 0 32px; }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .tab {
      min-height: 38px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      border-radius: 8px;
      padding: 0 14px;
      font: inherit;
      cursor: pointer;
    }
    .tab[aria-selected="true"] {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #064e49;
      font-weight: 700;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .live-status {
      margin-bottom: 16px;
    }
    .notice {
      border: 1px solid #f2c94c;
      background: #fff8db;
      color: #6b4e00;
      border-radius: 8px;
      padding: 10px 12px;
      line-height: 1.45;
    }
    .notice strong {
      display: block;
      color: #533b00;
      margin-bottom: 2px;
    }
    .metric, .toolbar, .chart-panel, .table-panel, .empty {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .metric {
      padding: 12px;
      min-height: 78px;
    }
    .metric.perf-card {
      border-color: #cfe3f1;
      background: #f8fbfe;
    }
    .metric .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }
    .metric .value {
      margin-top: 5px;
      font-size: 22px;
      font-weight: 750;
      overflow-wrap: anywhere;
    }
    .metric .value a {
      color: inherit;
      text-decoration-color: var(--accent);
      text-underline-offset: 3px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 190px;
      gap: 10px;
      padding: 10px;
      margin-bottom: 12px;
    }
    .chart-panel {
      overflow: hidden;
      margin-bottom: 12px;
    }
    .chart-head {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #f0f3f6;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    .chart-title {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      text-transform: uppercase;
    }
    .chart-note {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }
    .chart-body { padding: 14px; }
    .chart-body canvas {
      display: block;
      width: 100%;
      height: 340px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      padding: 0 14px 14px;
      color: var(--muted);
      font-size: 12px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend-swatch {
      width: 18px;
      height: 3px;
      border-radius: 999px;
    }
    input, select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      padding: 0 10px;
    }
    .table-panel { overflow: hidden; }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      overflow-wrap: anywhere;
    }
    th {
      background: #f0f3f6;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 750;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tbody tr:hover { background: #fafcfd; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .instrument { font-weight: 650; }
    .ticker {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eef2f6;
      color: #334155;
      font-size: 12px;
      font-weight: 700;
    }
    .history-strip {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(18px, 1fr);
      gap: 3px;
      align-items: end;
      min-height: 28px;
    }
    .history-cell {
      min-width: 18px;
      min-height: 22px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fafcfd;
    }
    .history-cell-active {
      border-color: rgba(15, 118, 110, 0.28);
    }
    .positive { color: var(--good); }
    .negative { color: var(--bad); }
    .missing { color: var(--warn); }
    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .status-premium {
      background: #fee4e2;
      color: #b42318;
    }
    .status-discount {
      background: #dcfce7;
      color: #166534;
    }
    .status-near_nav {
      background: #fef3c7;
      color: #92400e;
    }
    .status-na {
      background: #eef2f6;
      color: #475569;
    }
    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }
    a { color: var(--accent); }
    @media (max-width: 860px) {
      .topbar, .toolbar { display: block; }
      .timestamp { margin-top: 8px; text-align: left; white-space: normal; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .chart-head { display: block; }
      .toolbar > * + * { margin-top: 10px; }
      table { min-width: 980px; }
      .table-panel { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1>EasyETFs Holdings Tracker</h1>
        <div class="subtle">Latest holdings and mapped stock performance for easyGE, easyAI, and easybalanced.</div>
      </div>
      <div class="timestamp">
        <div class="subtle">Generated</div>
        <strong id="generated">Loading...</strong>
      </div>
    </div>
  </header>

  <main class="wrap">
    <nav id="tabs" class="tabs" aria-label="Funds"></nav>
    <section id="summary" class="summary"></section>
    <section id="liveStatus" class="live-status" aria-live="polite"></section>
    <section id="holdingsChartPanel" class="chart-panel">
      <div class="chart-head">
        <div>
          <h2 class="chart-title">Holding Weight Change By Snapshot</h2>
          <div id="holdingsChartNote" class="chart-note">Top current holdings, sampled from each raw holdings snapshot.</div>
        </div>
      </div>
      <div class="chart-body">
        <canvas id="holdingsChart" width="1100" height="340"></canvas>
      </div>
      <div id="holdingsChartLegend" class="legend"></div>
    </section>
    <section class="toolbar">
      <input id="search" type="search" placeholder="Search holdings" />
      <select id="perfFilter" aria-label="Performance filter">
        <option value="all">All holdings</option>
        <option value="mapped">With performance</option>
        <option value="missing">Missing performance</option>
      </select>
    </section>
    <section id="tablePanel" class="table-panel"></section>
  </main>

  <script>
    const state = {
      data: null,
      activeCode: null,
      query: "",
      perfFilter: "all",
      liveByFundCode: new Map(),
      liveStatusByFundCode: new Map(),
      timerId: null,
    };
    const generated = document.querySelector("#generated");
    const tabs = document.querySelector("#tabs");
    const summary = document.querySelector("#summary");
    const liveStatus = document.querySelector("#liveStatus");
    const holdingsChartPanel = document.querySelector("#holdingsChartPanel");
    const holdingsChartNote = document.querySelector("#holdingsChartNote");
    const holdingsChartLegend = document.querySelector("#holdingsChartLegend");
    const holdingsChart = document.querySelector("#holdingsChart");
    const holdingsChartCtx = holdingsChart.getContext("2d");
    const tablePanel = document.querySelector("#tablePanel");
    const search = document.querySelector("#search");
    const perfFilter = document.querySelector("#perfFilter");

    const fmtDateTime = value => value ? new Date(value).toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" }) : "n/a";
    const fmtPct = value => Number.isFinite(value) ? `${value.toFixed(2)}%` : "n/a";
    const fmtWeight = value => Number.isFinite(value) ? `${value.toFixed(2)}%` : "n/a";
    const fmtZac = value => Number.isFinite(value) ? `ZAC ${value.toFixed(2)}` : "n/a";
    const fmtDate = value => value ? new Date(`${value}T00:00:00Z`).toLocaleDateString(undefined, { month: "short", day: "numeric", timeZone: "UTC" }) : "n/a";
    const fmtMonth = value => {
      if (!value || !/^\d{4}-\d{2}$/.test(value)) return value || "n/a";
      const [year, month] = value.split("-").map(Number);
      return new Date(Date.UTC(year, month - 1, 1)).toLocaleDateString(undefined, { month: "short", year: "2-digit", timeZone: "UTC" });
    };
    const cssFor = value => Number.isFinite(value) ? (value >= 0 ? "positive" : "negative") : "missing";
    const chartHref = (fund, metric) => `chart.html?fund=${encodeURIComponent(fund.code)}&metric=${encodeURIComponent(metric)}`;
    const LIVE_PRICE_LOOKBACK_DAYS = 45;
    const FETCH_TIMEOUT_MS = 8000;
    const CORS_TEXT_PROXIES = [
      url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
      url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    ];

    function pctChange(current, previous) {
      if (!Number.isFinite(current) || !Number.isFinite(previous) || previous === 0) return null;
      return ((current / previous) - 1) * 100;
    }

    function fmtAge(durationMs) {
      if (!Number.isFinite(durationMs) || durationMs < 0) return "n/a";
      const totalSeconds = Math.floor(durationMs / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      if (days > 0) return `${days}d ${hours}h ${minutes}m`;
      if (hours > 0) return `${hours}h ${minutes}m ${seconds}s`;
      if (minutes > 0) return `${minutes}m ${seconds}s`;
      return `${seconds}s`;
    }

    function closeOnOrBefore(rows, targetDate) {
      const target = new Date(targetDate);
      const subset = rows.filter(row => row.date <= target && Number.isFinite(row.close));
      if (!subset.length) return null;
      return subset[subset.length - 1].close;
    }

    function computeEtfPerfFromRows(rows) {
      if (!rows.length) return { d1: null, d7: null, d30: null };
      const currentRow = rows[rows.length - 1];
      const current = currentRow.close;
      const currentDate = currentRow.date;
      return {
        d1: pctChange(current, closeOnOrBefore(rows, new Date(currentDate.getTime() - 1 * 86400000))),
        d7: pctChange(current, closeOnOrBefore(rows, new Date(currentDate.getTime() - 7 * 86400000))),
        d30: pctChange(current, closeOnOrBefore(rows, new Date(currentDate.getTime() - 30 * 86400000))),
      };
    }

    async function fetchDailyHistoryViaYahoo(ticker) {
      const symbol = String(ticker || "").trim();
      const chartUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?range=${LIVE_PRICE_LOOKBACK_DAYS}d&interval=1d`;
      const text = await fetchTextWithCorsFallback(chartUrl);
      const data = JSON.parse(text);
      const result = data?.chart?.result?.[0];
      const timestamps = result?.timestamp || [];
      const closes = result?.indicators?.quote?.[0]?.close || [];
      const parsed = [];
      for (let index = 0; index < timestamps.length; index += 1) {
        const date = new Date(Number(timestamps[index]) * 1000);
        const close = Number(closes[index]);
        if (Number.isFinite(date.getTime()) && Number.isFinite(close) && close > 0) parsed.push({ date, close });
      }
      if (!parsed.length) throw new Error("No valid Yahoo closes");
      return parsed.slice(-LIVE_PRICE_LOOKBACK_DAYS);
    }

    async function fetchWithTimeout(url) {
      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
      try {
        return await fetch(url, { cache: "no-store", signal: controller.signal });
      } finally {
        window.clearTimeout(timeoutId);
      }
    }

    async function fetchTextWithCorsFallback(url) {
      const candidates = [() => url, ...CORS_TEXT_PROXIES];
      const errors = [];
      for (const candidate of candidates) {
        const candidateUrl = candidate(url);
        try {
          const response = await fetchWithTimeout(candidateUrl);
          if (response.ok) return response.text();
          errors.push(`HTTP ${response.status}`);
        } catch (error) {
          errors.push(errorMessageFor(error));
        }
      }
      throw new Error(errors.filter(Boolean).join(" | ") || "all fetch attempts failed");
    }

    function parseNavValue(html) {
      const match = html.match(/Price\s*\/\s*NAV\s*\(ZAC\)[\s\S]*?([0-9][0-9,\s]*(?:\.[0-9]+)?)/i);
      if (!match) return null;
      const value = Number(match[1].replace(/[,\s]/g, ""));
      return Number.isFinite(value) && value > 0 ? value : null;
    }

    function parseNavDate(html) {
      const patterns = [
        /(?:As[\s-]*of|As[\s-]*at|NAV\s*Date|Date)\s*[:-]?\s*([0-9]{1,2}\s+[A-Za-z]{3,9}\s+[0-9]{4})/i,
        /(?:As[\s-]*of|As[\s-]*at|NAV\s*Date|Date)\s*[:-]?\s*([0-9]{4}-[0-9]{2}-[0-9]{2})/i,
        /(?:As[\s-]*of|As[\s-]*at|NAV\s*Date|Date)\s*[:-]?\s*([0-9]{1,2}[/-][0-9]{1,2}[/-][0-9]{4})/i,
      ];
      for (const pattern of patterns) {
        const match = html.match(pattern);
        if (!match) continue;
        const parsed = new Date(match[1].replace(",", ""));
        if (Number.isFinite(parsed.getTime())) return parsed.toISOString().slice(0, 10);
      }
      return new Date().toISOString().slice(0, 10);
    }

    async function fetchLiveNav(fund) {
      if (!fund?.instrument_page) return null;
      const html = await fetchTextWithCorsFallback(fund.instrument_page);
      const value = parseNavValue(html);
      if (!Number.isFinite(value)) throw new Error("NAV not found");
      return {
        value_zac: value,
        nav_date: parseNavDate(html),
        source_url: fund.instrument_page,
        captured_at_utc: new Date().toISOString(),
        source: "easyequities",
      };
    }

    function mergeLiveFundMetrics(fundCode, patch) {
      state.liveByFundCode.set(fundCode, { ...(state.liveByFundCode.get(fundCode) || {}), ...patch });
      if (state.activeCode === fundCode) render();
    }

    function recordLiveStatus(fundCode, source, status, message = "") {
      const current = state.liveStatusByFundCode.get(fundCode) || {};
      state.liveStatusByFundCode.set(fundCode, {
        ...current,
        [source]: {
          status,
          message,
          checked_at_utc: new Date().toISOString(),
        },
      });
      if (state.activeCode === fundCode) renderLiveStatus(activeFund());
    }

    function errorMessageFor(error) {
      if (!error) return "Unknown error";
      return error.message || String(error);
    }

    async function fetchLiveFundMetrics(fund) {
      if (fund?.market_ticker) {
        try {
          const rows = await fetchDailyHistoryViaYahoo(fund.market_ticker);
          const latest = rows[rows.length - 1];
          mergeLiveFundMetrics(fund.code, {
            latest_market_price: {
              value_zac: latest.close,
              source: "yahoo",
              price_at_utc: latest.date.toISOString(),
              captured_at_utc: new Date().toISOString(),
            },
            etf_performance: computeEtfPerfFromRows(rows),
          });
          recordLiveStatus(fund.code, "price", "ok");
        } catch (error) {
          console.warn(`Live price fetch failed for ${fund.code}`, error);
          recordLiveStatus(fund.code, "price", "error", errorMessageFor(error));
        }
      }

      try {
        const latestNav = await fetchLiveNav(fund);
        if (latestNav) mergeLiveFundMetrics(fund.code, { latest_nav: latestNav });
        recordLiveStatus(fund.code, "nav", "ok");
      } catch (error) {
        console.warn(`Live NAV fetch failed for ${fund.code}`, error);
        recordLiveStatus(fund.code, "nav", "error", errorMessageFor(error));
      }
    }

    async function refreshLiveMetricsSequentially(funds) {
      for (const fund of funds || []) {
        await fetchLiveFundMetrics(fund);
      }
    }

    function activeFund() {
      return state.data.funds.find(fund => fund.code === state.activeCode) || state.data.funds[0];
    }

    function renderTabs() {
      tabs.innerHTML = "";
      for (const fund of state.data.funds) {
        const button = document.createElement("button");
        button.className = "tab";
        button.type = "button";
        button.setAttribute("aria-selected", String(fund.code === state.activeCode));
        button.textContent = fund.slug;
        button.addEventListener("click", () => {
          state.activeCode = fund.code;
          render();
        });
        tabs.appendChild(button);
      }
    }

    function renderSummary(fund) {
      const largest = fund.holdings[0];
      const liveMetrics = state.liveByFundCode.get(fund.code) || null;
      const latestNav = liveMetrics?.latest_nav || fund.latest_nav || null;
      const latestMarket = liveMetrics?.latest_market_price || fund.latest_market_price || null;
      const etfPerf = liveMetrics?.etf_performance || fund.etf_performance || { d1: null, d7: null, d30: null };
      const baseNavGap = fund.estimated_nav_gap || { status: "n/a", difference_zac: null, difference_pct: null, label: "n/a" };
      const navGap = (latestNav && latestMarket && Number.isFinite(latestNav.value_zac) && Number.isFinite(latestMarket.value_zac))
        ? (() => {
            const differenceZac = latestMarket.value_zac - latestNav.value_zac;
            const differencePct = latestNav.value_zac ? (differenceZac / latestNav.value_zac) * 100 : null;
            const status = !Number.isFinite(differencePct)
              ? "n/a"
              : (Math.abs(differencePct) <= 0.25 ? "near_nav" : (differencePct > 0 ? "premium" : "discount"));
            return { status, difference_zac: differenceZac, difference_pct: differencePct, label: "estimated premium/discount to NAV" };
          })()
        : baseNavGap;
      const navStatusClass = navGap.status ? `status-${navGap.status.replace("/", "_")}` : "status-na";
      const holdingsCapturedAt = fund.captured_at_utc || null;
      const holdingsAge = holdingsCapturedAt ? fmtAge(Date.now() - new Date(holdingsCapturedAt).getTime()) : "n/a";
      const rows = [
        ["Fund 1d", `<span class="${cssFor(etfPerf.d1)}">${fmtPct(etfPerf.d1)}</span>`, "perf-card"],
        ["Fund 7d", `<span class="${cssFor(etfPerf.d7)}">${fmtPct(etfPerf.d7)}</span>`, "perf-card"],
        ["Fund 30d", `<span class="${cssFor(etfPerf.d30)}">${fmtPct(etfPerf.d30)}</span>`, "perf-card"],
        ["Snapshot", fund.snapshot_date || "n/a"],
        ["Last Holdings Update", holdingsCapturedAt ? fmtDateTime(holdingsCapturedAt) : "n/a"],
        ["Time Since Holdings Update", holdingsAge],
        ["Holdings", fund.holdings_count],
        ["Total weight", fmtWeight(fund.total_weight)],
        ["Largest holding", largest ? largest.instrument : "n/a"],
        ["NAV (latest)", latestNav ? `<a href="${chartHref(fund, "nav")}">${fmtZac(latestNav.value_zac)}</a>` : "n/a"],
        ["Market Price (latest)", latestMarket ? `<a href="${chartHref(fund, "nav")}">${fmtZac(latestMarket?.value_zac)}</a>` : "n/a"],
        ["Difference (Price - NAV)", Number.isFinite(navGap.difference_zac) ? fmtZac(navGap.difference_zac) : "n/a"],
        [
          "Estimated Premium/Discount to NAV",
          Number.isFinite(navGap.difference_pct)
            ? `<a href="${chartHref(fund, "premium")}" aria-label="View premium discount chart"><span class="status-pill ${navStatusClass}">${fmtPct(navGap.difference_pct)}</span></a>`
            : `<span class="status-pill ${navStatusClass}">n/a</span>`,
        ],
      ];
      summary.innerHTML = rows.map(([label, value, extraClass]) => `
        <article class="metric ${extraClass || ""}">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
          ${
            label === "NAV (latest)" && latestNav
              ? `<div class="subtle">As of ${latestNav.nav_date} | Captured ${fmtDateTime(latestNav.captured_at_utc)}${liveMetrics?.latest_nav ? " | Live frontend NAV" : ""}</div>`
              : ""
          }
          ${
            label === "Market Price (latest)" && latestMarket
              ? `<div class="subtle">Source ${latestMarket.source || "n/a"} | Price time ${fmtDateTime(latestMarket.price_at_utc || latestMarket.captured_at_utc)}${liveMetrics?.latest_market_price ? " | Live frontend quote" : ""}</div>`
              : ""
          }
        </article>
      `).join("");
    }

    function renderLiveStatus(fund) {
      const statuses = state.liveStatusByFundCode.get(fund.code) || {};
      const failures = [
        ["price", "market price"],
        ["nav", "NAV"],
      ]
        .map(([source, label]) => ({ label, ...(statuses[source] || {}) }))
        .filter(row => row.status === "error");

      if (!failures.length) {
        liveStatus.innerHTML = "";
        return;
      }

      liveStatus.innerHTML = `
        <div class="notice" role="status">
          <strong>Live data refresh failed for ${fund.slug}</strong>
          Showing the last built values from site/data.json for ${failures.map(row => row.label).join(" and ")}.
          ${failures.map(row => `
            <div>${row.label}: ${row.message || "unavailable"}${row.checked_at_utc ? ` (${fmtDateTime(row.checked_at_utc)})` : ""}</div>
          `).join("")}
        </div>
      `;
    }

    function visibleHoldings(fund) {
      const query = state.query.trim().toLowerCase();
      return fund.holdings.filter(row => {
        const hasPerf = row.performance && [row.performance.d1, row.performance.d7, row.performance.d30].some(Number.isFinite);
        if (state.perfFilter === "mapped" && !hasPerf) return false;
        if (state.perfFilter === "missing" && hasPerf) return false;
        if (!query) return true;
        return [row.instrument, row.currency, row.ticker].filter(Boolean).join(" ").toLowerCase().includes(query);
      });
    }

    function monthlyChangeByInstrument(fund) {
      const monthly = fund.monthly_changes || { changes: [] };
      const map = new Map();
      for (const row of (monthly.changes || [])) map.set(row.instrument, row.change_pp);
      return map;
    }

    function weeklyChangeByInstrument(fund) {
      const weekly = fund.weekly_changes || { changes: [] };
      const map = new Map();
      for (const row of (weekly.changes || [])) map.set(row.instrument, row.change_pp);
      return map;
    }

    function snapshotChangeByInstrument(fund) {
      const snapshot = fund.snapshot_changes || { changes: [] };
      const map = new Map();
      for (const row of (snapshot.changes || [])) map.set(row.instrument, row.change_pp);
      return map;
    }

    function monthlyHistoryByInstrument(fund) {
      const monthly = fund.monthly_holdings_history || { months: [], rows: [] };
      const maxWeight = Math.max(
        0,
        ...monthly.rows.flatMap(row => (row.weights || []).filter(Number.isFinite))
      );
      const map = new Map();
      for (const row of (monthly.rows || [])) map.set(row.instrument, { weights: row.weights || [], months: monthly.months || [], maxWeight });
      return map;
    }

    function renderHistoryStrip(entry) {
      if (!entry || !entry.weights.length) return '<span class="subtle">n/a</span>';
      return `
        <div class="history-strip">
          ${entry.weights.map((weight, index) => {
            const safeWeight = Number.isFinite(weight) ? weight : 0;
            const intensity = entry.maxWeight > 0 ? safeWeight / entry.maxWeight : 0;
            const alpha = safeWeight > 0 ? Math.max(0.14, Math.min(0.86, intensity * 0.86)) : 0;
            const cls = safeWeight > 0 ? "history-cell history-cell-active" : "history-cell";
            const style = safeWeight > 0 ? `background-color: rgba(15, 118, 110, ${alpha.toFixed(3)});` : "";
            const month = entry.months[index] ? fmtMonth(entry.months[index]) : "n/a";
            const title = `${month}: ${fmtWeight(safeWeight)}`;
            return `<span class="${cls}" style="${style}" title="${title}" aria-label="${title}"></span>`;
          }).join("")}
        </div>
      `;
    }

    function snapshotSeriesForChart(fund) {
      const history = fund.snapshot_holdings_history || { snapshots: [], rows: [] };
      const snapshots = history.snapshots || [];
      const rows = (history.rows || [])
        .filter(row => row.instrument && Array.isArray(row.weights))
        .filter(row => !String(row.instrument).toUpperCase().includes(".CASH"))
        .sort((a, b) => (Number(b.latest_weight) || 0) - (Number(a.latest_weight) || 0))
        .slice(0, 8);
      return { snapshots, rows };
    }

    function drawHoldingsSnapshotChart(fund) {
      const { snapshots, rows } = snapshotSeriesForChart(fund);
      if (!snapshots.length || !rows.length) {
        holdingsChartPanel.className = "chart-panel";
        holdingsChartNote.textContent = "No per-snapshot holdings history is available yet.";
        holdingsChartLegend.innerHTML = "";
        holdingsChartCtx.clearRect(0, 0, holdingsChart.width, holdingsChart.height);
        return;
      }

      holdingsChartPanel.className = "chart-panel";
      holdingsChartNote.textContent = `${rows.length} top current holdings across ${snapshots.length} raw snapshot${snapshots.length === 1 ? "" : "s"}.`;
      const palette = ["#0f766e", "#2563eb", "#dc2626", "#9333ea", "#ea580c", "#16a34a", "#0891b2", "#be123c"];
      holdingsChartLegend.innerHTML = rows.map((row, index) => `
        <span class="legend-item"><span class="legend-swatch" style="background:${palette[index % palette.length]}"></span>${row.instrument}</span>
      `).join("");

      const rect = holdingsChart.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      holdingsChart.width = Math.max(1, Math.floor(rect.width * ratio));
      holdingsChart.height = Math.max(1, Math.floor(rect.height * ratio));
      holdingsChartCtx.setTransform(ratio, 0, 0, ratio, 0, 0);

      const width = rect.width;
      const height = rect.height;
      const pad = { top: 18, right: 20, bottom: 42, left: 58 };
      const values = rows.flatMap(row => row.weights.map(Number).filter(Number.isFinite));
      const max = Math.max(1, ...values);
      const niceMax = Math.ceil(max / 2) * 2;
      const xFor = index => pad.left + (snapshots.length === 1 ? 0 : (index / (snapshots.length - 1)) * (width - pad.left - pad.right));
      const yFor = value => pad.top + ((niceMax - value) / niceMax) * (height - pad.top - pad.bottom);

      holdingsChartCtx.clearRect(0, 0, width, height);
      holdingsChartCtx.fillStyle = "#ffffff";
      holdingsChartCtx.fillRect(0, 0, width, height);
      holdingsChartCtx.strokeStyle = "#dde3ea";
      holdingsChartCtx.lineWidth = 1;
      holdingsChartCtx.beginPath();
      for (let index = 0; index <= 4; index += 1) {
        const y = pad.top + (index / 4) * (height - pad.top - pad.bottom);
        holdingsChartCtx.moveTo(pad.left, y);
        holdingsChartCtx.lineTo(width - pad.right, y);
      }
      holdingsChartCtx.stroke();

      holdingsChartCtx.fillStyle = "#647282";
      holdingsChartCtx.font = "12px system-ui, sans-serif";
      holdingsChartCtx.textAlign = "right";
      holdingsChartCtx.textBaseline = "middle";
      for (let index = 0; index <= 4; index += 1) {
        const value = niceMax - (index / 4) * niceMax;
        const y = pad.top + (index / 4) * (height - pad.top - pad.bottom);
        holdingsChartCtx.fillText(fmtWeight(value), pad.left - 8, y);
      }

      rows.forEach((row, rowIndex) => {
        holdingsChartCtx.strokeStyle = palette[rowIndex % palette.length];
        holdingsChartCtx.lineWidth = 2;
        holdingsChartCtx.beginPath();
        row.weights.forEach((weight, index) => {
          const x = xFor(index);
          const y = yFor(Number(weight) || 0);
          if (index === 0) holdingsChartCtx.moveTo(x, y);
          else holdingsChartCtx.lineTo(x, y);
        });
        holdingsChartCtx.stroke();
      });

      holdingsChartCtx.fillStyle = "#647282";
      holdingsChartCtx.textBaseline = "top";
      holdingsChartCtx.textAlign = "left";
      holdingsChartCtx.fillText(fmtDate(snapshots[0]), pad.left, height - pad.bottom + 14);
      holdingsChartCtx.textAlign = "right";
      holdingsChartCtx.fillText(fmtDate(snapshots[snapshots.length - 1]), width - pad.right, height - pad.bottom + 14);
    }

    function renderTable(fund) {
      const rows = visibleHoldings(fund);
      const weeklyChangeMap = weeklyChangeByInstrument(fund);
      const snapshotChangeMap = snapshotChangeByInstrument(fund);
      const monthlyHistoryMap = monthlyHistoryByInstrument(fund);
      if (!rows.length) {
        tablePanel.className = "empty";
        tablePanel.textContent = "No holdings match the current filters.";
        return;
      }
      tablePanel.className = "table-panel";
      tablePanel.innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="width:28%">Instrument</th>
              <th style="width:10%">Ticker</th>
              <th style="width:9%">Currency</th>
              <th class="num" style="width:10%">Weight</th>
              <th style="width:17%">Weight History</th>
              <th class="num" style="width:10%">Since last update (pp)</th>
              <th class="num" style="width:10%">Weekly Δ (pp)</th>
              <th class="num" style="width:8%">1d</th>
              <th class="num" style="width:8%">7d</th>
              <th class="num" style="width:8%">30d</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(row => {
              const perf = row.performance || {};
              return `
                <tr>
                  <td class="instrument">${row.instrument}</td>
                  <td>${row.ticker ? `<span class="ticker">${row.ticker}</span>` : "<span class=\"subtle\">n/a</span>"}</td>
                  <td>${row.currency}</td>
                  <td class="num">${fmtWeight(row.weight)}</td>
                  <td>${renderHistoryStrip(monthlyHistoryMap.get(row.instrument))}</td>
                  <td class="num ${cssFor(snapshotChangeMap.get(row.instrument))}">${fmtWeight(snapshotChangeMap.get(row.instrument))}</td>
                  <td class="num ${cssFor(weeklyChangeMap.get(row.instrument))}">${fmtWeight(weeklyChangeMap.get(row.instrument))}</td>
                  <td class="num ${cssFor(perf.d1)}">${fmtPct(perf.d1)}</td>
                  <td class="num ${cssFor(perf.d7)}">${fmtPct(perf.d7)}</td>
                  <td class="num ${cssFor(perf.d30)}">${fmtPct(perf.d30)}</td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
    }

    function render() {
      const fund = activeFund();
      renderTabs();
      renderSummary(fund);
      renderLiveStatus(fund);
      drawHoldingsSnapshotChart(fund);
      renderTable(fund);
    }

    function startUpdateTimer() {
      if (state.timerId) clearInterval(state.timerId);
      state.timerId = setInterval(() => {
        if (!state.data || !state.activeCode) return;
        renderSummary(activeFund());
      }, 1000);
    }

    search.addEventListener("input", event => {
      state.query = event.target.value;
      renderTable(activeFund());
    });
    perfFilter.addEventListener("change", event => {
      state.perfFilter = event.target.value;
      renderTable(activeFund());
    });

    fetch(`data.json?ts=${Date.now()}`)
      .then(response => response.json())
      .then(data => {
        state.data = data;
        state.activeCode = data.funds[0]?.code;
        generated.textContent = fmtDateTime(data.generated_at_utc);
        render();
        startUpdateTimer();
        refreshLiveMetricsSequentially(data.funds);
      })
      .catch(error => {
        generated.textContent = "Unable to load";
        tablePanel.className = "empty";
        tablePanel.textContent = `Could not load site/data.json: ${error.message}`;
      });

    window.addEventListener("resize", () => {
      if (state.data) drawHoldingsSnapshotChart(activeFund());
    });
  </script>
</body>
</html>
