<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EasyETFs Holdings Tracker</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #647282;
      --line: #dde3ea;
      --accent: #0f766e;
      --accent-soft: #d9f0ed;
      --good: #0a7a3d;
      --bad: #b42318;
      --warn: #8a5a00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }
    .wrap {
      width: min(1280px, calc(100vw - 32px));
      margin: 0 auto;
    }
    .topbar {
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: 0;
    }
    .subtle { color: var(--muted); }
    .timestamp {
      text-align: right;
      line-height: 1.5;
      white-space: nowrap;
    }
    main { padding: 20px 0 32px; }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .tab {
      min-height: 38px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      border-radius: 8px;
      padding: 0 14px;
      font: inherit;
      cursor: pointer;
    }
    .tab[aria-selected="true"] {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #064e49;
      font-weight: 700;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .metric, .toolbar, .table-panel, .empty {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .metric {
      padding: 12px;
      min-height: 78px;
    }
    .metric .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }
    .metric .value {
      margin-top: 5px;
      font-size: 22px;
      font-weight: 750;
      overflow-wrap: anywhere;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 190px;
      gap: 10px;
      padding: 10px;
      margin-bottom: 12px;
    }
    input, select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      padding: 0 10px;
    }
    .table-panel { overflow: hidden; }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      overflow-wrap: anywhere;
    }
    th {
      background: #f0f3f6;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 750;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tbody tr:hover { background: #fafcfd; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .instrument { font-weight: 650; }
    .ticker {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eef2f6;
      color: #334155;
      font-size: 12px;
      font-weight: 700;
    }
    .positive { color: var(--good); }
    .negative { color: var(--bad); }
    .missing { color: var(--warn); }
    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }
    a { color: var(--accent); }
    @media (max-width: 860px) {
      .topbar, .toolbar { display: block; }
      .timestamp { margin-top: 8px; text-align: left; white-space: normal; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar > * + * { margin-top: 10px; }
      table { min-width: 760px; }
      .table-panel { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1>EasyETFs Holdings Tracker</h1>
        <div class="subtle">Latest holdings and mapped stock performance for easyGE, easyAI, and easybalanced.</div>
      </div>
      <div class="timestamp">
        <div class="subtle">Generated</div>
        <strong id="generated">Loading...</strong>
      </div>
    </div>
  </header>

  <main class="wrap">
    <nav id="tabs" class="tabs" aria-label="Funds"></nav>
    <section id="summary" class="summary"></section>
    <section class="toolbar">
      <input id="search" type="search" placeholder="Search holdings" />
      <select id="perfFilter" aria-label="Performance filter">
        <option value="all">All holdings</option>
        <option value="mapped">With performance</option>
        <option value="missing">Missing performance</option>
      </select>
    </section>
    <section id="tablePanel" class="table-panel"></section>
  </main>

  <script>
    const state = { data: null, activeCode: null, query: "", perfFilter: "all" };
    const generated = document.querySelector("#generated");
    const tabs = document.querySelector("#tabs");
    const summary = document.querySelector("#summary");
    const tablePanel = document.querySelector("#tablePanel");
    const search = document.querySelector("#search");
    const perfFilter = document.querySelector("#perfFilter");

    const fmtDateTime = value => value ? new Date(value).toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" }) : "n/a";
    const fmtPct = value => Number.isFinite(value) ? `${value.toFixed(2)}%` : "n/a";
    const fmtWeight = value => Number.isFinite(value) ? `${value.toFixed(2)}%` : "n/a";
    const cssFor = value => Number.isFinite(value) ? (value >= 0 ? "positive" : "negative") : "missing";

    function activeFund() {
      return state.data.funds.find(fund => fund.code === state.activeCode) || state.data.funds[0];
    }

    function renderTabs() {
      tabs.innerHTML = "";
      for (const fund of state.data.funds) {
        const button = document.createElement("button");
        button.className = "tab";
        button.type = "button";
        button.setAttribute("aria-selected", String(fund.code === state.activeCode));
        button.textContent = fund.slug;
        button.addEventListener("click", () => {
          state.activeCode = fund.code;
          render();
        });
        tabs.appendChild(button);
      }
    }

    function renderSummary(fund) {
      const largest = fund.holdings[0];
      const rows = [
        ["Snapshot", fund.snapshot_date || "n/a"],
        ["Holdings", fund.holdings_count],
        ["Total weight", fmtWeight(fund.total_weight)],
        ["Largest holding", largest ? largest.instrument : "n/a"],
      ];
      summary.innerHTML = rows.map(([label, value]) => `
        <article class="metric">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
        </article>
      `).join("");
    }

    function visibleHoldings(fund) {
      const query = state.query.trim().toLowerCase();
      return fund.holdings.filter(row => {
        const hasPerf = row.performance && [row.performance.d1, row.performance.d7, row.performance.d30].some(Number.isFinite);
        if (state.perfFilter === "mapped" && !hasPerf) return false;
        if (state.perfFilter === "missing" && hasPerf) return false;
        if (!query) return true;
        return [row.instrument, row.currency, row.ticker].filter(Boolean).join(" ").toLowerCase().includes(query);
      });
    }

    function renderTable(fund) {
      const rows = visibleHoldings(fund);
      if (!rows.length) {
        tablePanel.className = "empty";
        tablePanel.textContent = "No holdings match the current filters.";
        return;
      }
      tablePanel.className = "table-panel";
      tablePanel.innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="width:34%">Instrument</th>
              <th style="width:12%">Ticker</th>
              <th style="width:10%">Currency</th>
              <th class="num" style="width:11%">Weight</th>
              <th class="num" style="width:11%">1d</th>
              <th class="num" style="width:11%">7d</th>
              <th class="num" style="width:11%">30d</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(row => {
              const perf = row.performance || {};
              return `
                <tr>
                  <td class="instrument">${row.instrument}</td>
                  <td>${row.ticker ? `<span class="ticker">${row.ticker}</span>` : "<span class=\"subtle\">n/a</span>"}</td>
                  <td>${row.currency}</td>
                  <td class="num">${fmtWeight(row.weight)}</td>
                  <td class="num ${cssFor(perf.d1)}">${fmtPct(perf.d1)}</td>
                  <td class="num ${cssFor(perf.d7)}">${fmtPct(perf.d7)}</td>
                  <td class="num ${cssFor(perf.d30)}">${fmtPct(perf.d30)}</td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
    }

    function render() {
      const fund = activeFund();
      renderTabs();
      renderSummary(fund);
      renderTable(fund);
    }

    search.addEventListener("input", event => {
      state.query = event.target.value;
      renderTable(activeFund());
    });
    perfFilter.addEventListener("change", event => {
      state.perfFilter = event.target.value;
      renderTable(activeFund());
    });

    fetch("data.json")
      .then(response => response.json())
      .then(data => {
        state.data = data;
        state.activeCode = data.funds[0]?.code;
        generated.textContent = fmtDateTime(data.generated_at_utc);
        render();
      })
      .catch(error => {
        generated.textContent = "Unable to load";
        tablePanel.className = "empty";
        tablePanel.textContent = `Could not load site/data.json: ${error.message}`;
      });
  </script>
</body>
</html>
