<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EasyETFs Holdings Tracker</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #647282;
      --line: #dde3ea;
      --accent: #0f766e;
      --accent-soft: #d9f0ed;
      --good: #0a7a3d;
      --bad: #b42318;
      --warn: #8a5a00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }
    .wrap {
      width: min(1280px, calc(100vw - 32px));
      margin: 0 auto;
    }
    .topbar {
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: 0;
    }
    .subtle { color: var(--muted); }
    .timestamp {
      text-align: right;
      line-height: 1.5;
      white-space: nowrap;
    }
    main { padding: 20px 0 32px; }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .tab {
      min-height: 38px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      border-radius: 8px;
      padding: 0 14px;
      font: inherit;
      cursor: pointer;
    }
    .tab[aria-selected="true"] {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #064e49;
      font-weight: 700;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .metric, .toolbar, .table-panel, .empty {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .metric {
      padding: 12px;
      min-height: 78px;
    }
    .metric .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }
    .metric .value {
      margin-top: 5px;
      font-size: 22px;
      font-weight: 750;
      overflow-wrap: anywhere;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 190px;
      gap: 10px;
      padding: 10px;
      margin-bottom: 12px;
    }
    .heatmap-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .heatmap-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #f0f3f6;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .heatmap-title {
      margin: 0;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 750;
    }
    .heatmap-note {
      color: var(--muted);
      font-size: 12px;
    }
    .heatmap-scroll {
      overflow-x: auto;
      padding: 0 0 2px;
    }
    .heatmap-table {
      width: auto;
      min-width: 100%;
      border-collapse: collapse;
    }
    .heatmap-table th,
    .heatmap-table td {
      white-space: nowrap;
    }
    .heatmap-instrument {
      position: sticky;
      left: 0;
      z-index: 2;
      background: #ffffff;
      min-width: 220px;
      max-width: 320px;
    }
    .heatmap-cell {
      min-width: 72px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      border-left: 1px solid var(--line);
    }
    .heatmap-fill {
      color: #064e49;
      font-weight: 700;
    }
    .heatmap-empty {
      background: #fafcfd;
      color: var(--muted);
      font-weight: 600;
    }
    input, select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      padding: 0 10px;
    }
    .table-panel { overflow: hidden; }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      overflow-wrap: anywhere;
    }
    th {
      background: #f0f3f6;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 750;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tbody tr:hover { background: #fafcfd; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .instrument { font-weight: 650; }
    .ticker {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eef2f6;
      color: #334155;
      font-size: 12px;
      font-weight: 700;
    }
    .positive { color: var(--good); }
    .negative { color: var(--bad); }
    .missing { color: var(--warn); }
    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .status-premium {
      background: #fee4e2;
      color: #b42318;
    }
    .status-discount {
      background: #dcfce7;
      color: #166534;
    }
    .status-near_nav {
      background: #fef3c7;
      color: #92400e;
    }
    .status-na {
      background: #eef2f6;
      color: #475569;
    }
    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }
    a { color: var(--accent); }
    @media (max-width: 860px) {
      .topbar, .toolbar { display: block; }
      .timestamp { margin-top: 8px; text-align: left; white-space: normal; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar > * + * { margin-top: 10px; }
      table { min-width: 760px; }
      .table-panel { overflow-x: auto; }
      .heatmap-instrument { min-width: 180px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1>EasyETFs Holdings Tracker</h1>
        <div class="subtle">Latest holdings and mapped stock performance for easyGE, easyAI, and easybalanced.</div>
      </div>
      <div class="timestamp">
        <div class="subtle">Generated</div>
        <strong id="generated">Loading...</strong>
      </div>
    </div>
  </header>

  <main class="wrap">
    <nav id="tabs" class="tabs" aria-label="Funds"></nav>
    <section id="summary" class="summary"></section>
    <section class="toolbar">
      <input id="search" type="search" placeholder="Search holdings" />
      <select id="perfFilter" aria-label="Performance filter">
        <option value="all">All holdings</option>
        <option value="mapped">With performance</option>
        <option value="missing">Missing performance</option>
      </select>
    </section>
    <section id="heatmapPanel"></section>
    <section id="tablePanel" class="table-panel"></section>
  </main>

  <script>
    const state = { data: null, activeCode: null, query: "", perfFilter: "all" };
    const generated = document.querySelector("#generated");
    const tabs = document.querySelector("#tabs");
    const summary = document.querySelector("#summary");
    const heatmapPanel = document.querySelector("#heatmapPanel");
    const tablePanel = document.querySelector("#tablePanel");
    const search = document.querySelector("#search");
    const perfFilter = document.querySelector("#perfFilter");

    const fmtDateTime = value => value ? new Date(value).toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" }) : "n/a";
    const fmtPct = value => Number.isFinite(value) ? `${value.toFixed(2)}%` : "n/a";
    const fmtWeight = value => Number.isFinite(value) ? `${value.toFixed(2)}%` : "n/a";
    const fmtZac = value => Number.isFinite(value) ? `ZAC ${value.toFixed(2)}` : "n/a";
    const fmtMonth = value => {
      if (!value || !/^\d{4}-\d{2}$/.test(value)) return value || "n/a";
      const [year, month] = value.split("-").map(Number);
      return new Date(Date.UTC(year, month - 1, 1)).toLocaleDateString(undefined, { month: "short", year: "2-digit", timeZone: "UTC" });
    };
    const cssFor = value => Number.isFinite(value) ? (value >= 0 ? "positive" : "negative") : "missing";

    function activeFund() {
      return state.data.funds.find(fund => fund.code === state.activeCode) || state.data.funds[0];
    }

    function renderTabs() {
      tabs.innerHTML = "";
      for (const fund of state.data.funds) {
        const button = document.createElement("button");
        button.className = "tab";
        button.type = "button";
        button.setAttribute("aria-selected", String(fund.code === state.activeCode));
        button.textContent = fund.slug;
        button.addEventListener("click", () => {
          state.activeCode = fund.code;
          render();
        });
        tabs.appendChild(button);
      }
    }

    function renderSummary(fund) {
      const largest = fund.holdings[0];
      const latestNav = fund.latest_nav || null;
      const latestMarket = fund.latest_market_price || null;
      const navGap = fund.estimated_nav_gap || { status: "n/a", difference_zac: null, difference_pct: null, label: "n/a" };
      const navStatusClass = navGap.status ? `status-${navGap.status.replace("/", "_")}` : "status-na";
      const rows = [
        ["Snapshot", fund.snapshot_date || "n/a"],
        ["Holdings", fund.holdings_count],
        ["Total weight", fmtWeight(fund.total_weight)],
        ["Largest holding", largest ? largest.instrument : "n/a"],
        ["NAV (latest)", fmtZac(latestNav?.value_zac)],
        ["Market Price (latest)", fmtZac(latestMarket?.value_zac)],
        ["Difference (Price - NAV)", Number.isFinite(navGap.difference_zac) ? fmtZac(navGap.difference_zac) : "n/a"],
        ["Estimated Premium/Discount to NAV", `<span class="status-pill ${navStatusClass}">${fmtPct(navGap.difference_pct)}</span>`],
      ];
      summary.innerHTML = rows.map(([label, value]) => `
        <article class="metric">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
          ${
            label === "NAV (latest)" && latestNav
              ? `<div class="subtle">As of ${latestNav.nav_date} | Captured ${fmtDateTime(latestNav.captured_at_utc)}</div>`
              : ""
          }
          ${
            label === "Market Price (latest)" && latestMarket
              ? `<div class="subtle">Source ${latestMarket.source || "n/a"} | Price time ${fmtDateTime(latestMarket.price_at_utc || latestMarket.captured_at_utc)}</div>`
              : ""
          }
        </article>
      `).join("");
    }

    function visibleHoldings(fund) {
      const query = state.query.trim().toLowerCase();
      return fund.holdings.filter(row => {
        const hasPerf = row.performance && [row.performance.d1, row.performance.d7, row.performance.d30].some(Number.isFinite);
        if (state.perfFilter === "mapped" && !hasPerf) return false;
        if (state.perfFilter === "missing" && hasPerf) return false;
        if (!query) return true;
        return [row.instrument, row.currency, row.ticker].filter(Boolean).join(" ").toLowerCase().includes(query);
      });
    }

    function monthlyChangeByInstrument(fund) {
      const monthly = fund.monthly_changes || { changes: [] };
      const map = new Map();
      for (const row of (monthly.changes || [])) map.set(row.instrument, row.change_pp);
      return map;
    }

    function renderHeatmap(fund) {
      const monthly = fund.monthly_holdings_history || { months: [], rows: [] };
      if (!monthly.months.length || !monthly.rows.length) {
        heatmapPanel.className = "empty";
        heatmapPanel.innerHTML = `
          <div>Holdings weight history will appear once monthly snapshots are available for ${fund.slug}.</div>
        `;
        return;
      }

      const maxWeight = Math.max(
        0,
        ...monthly.rows.flatMap(row => (row.weights || []).filter(Number.isFinite))
      );
      const monthHeaders = monthly.months.map(month => `<th class="num" style="min-width:72px">${fmtMonth(month)}</th>`).join("");
      const rows = monthly.rows.map(row => {
        const cells = (row.weights || []).map(weight => {
          const safeWeight = Number.isFinite(weight) ? weight : 0;
          const intensity = maxWeight > 0 ? safeWeight / maxWeight : 0;
          const alpha = safeWeight > 0 ? Math.max(0.15, Math.min(0.85, intensity * 0.85)) : 0;
          const style = safeWeight > 0 ? `background-color: rgba(15, 118, 110, ${alpha.toFixed(3)});` : "";
          const cls = safeWeight > 0 ? "heatmap-fill" : "heatmap-empty";
          const label = safeWeight > 0 ? fmtWeight(safeWeight) : "0.00%";
          const title = `${row.instrument} ${label}`;
          return `<td class="heatmap-cell ${cls}" style="${style}" title="${title}">${safeWeight > 0 ? label : "—"}</td>`;
        }).join("");
        const activeLabel = row.first_month && row.last_month && row.first_month !== row.last_month
          ? `${fmtMonth(row.first_month)} to ${fmtMonth(row.last_month)}`
          : (row.first_month ? fmtMonth(row.first_month) : "none");
        return `
          <tr>
            <td class="instrument heatmap-instrument">
              ${row.instrument}
              <div class="subtle">Active: ${activeLabel}</div>
            </td>
            ${cells}
          </tr>
        `;
      }).join("");

      heatmapPanel.className = "heatmap-panel";
      heatmapPanel.innerHTML = `
        <div class="heatmap-head">
          <h3 class="heatmap-title">Holdings Weight History</h3>
          <div class="heatmap-note">Darker cells indicate higher portfolio weight; blank cells indicate no position in that month.</div>
        </div>
        <div class="heatmap-scroll">
          <table class="heatmap-table">
            <thead>
              <tr>
                <th class="heatmap-instrument">Holding</th>
                ${monthHeaders}
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderTable(fund) {
      const rows = visibleHoldings(fund);
      const monthlyChangeMap = monthlyChangeByInstrument(fund);
      if (!rows.length) {
        tablePanel.className = "empty";
        tablePanel.textContent = "No holdings match the current filters.";
        return;
      }
      tablePanel.className = "table-panel";
      tablePanel.innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="width:34%">Instrument</th>
              <th style="width:12%">Ticker</th>
              <th style="width:10%">Currency</th>
              <th class="num" style="width:11%">Weight</th>
              <th class="num" style="width:11%">Monthly Δ (pp)</th>
              <th class="num" style="width:10%">1d</th>
              <th class="num" style="width:10%">7d</th>
              <th class="num" style="width:10%">30d</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(row => {
              const perf = row.performance || {};
              return `
                <tr>
                  <td class="instrument">${row.instrument}</td>
                  <td>${row.ticker ? `<span class="ticker">${row.ticker}</span>` : "<span class=\"subtle\">n/a</span>"}</td>
                  <td>${row.currency}</td>
                  <td class="num">${fmtWeight(row.weight)}</td>
                  <td class="num ${cssFor(monthlyChangeMap.get(row.instrument))}">${fmtWeight(monthlyChangeMap.get(row.instrument))}</td>
                  <td class="num ${cssFor(perf.d1)}">${fmtPct(perf.d1)}</td>
                  <td class="num ${cssFor(perf.d7)}">${fmtPct(perf.d7)}</td>
                  <td class="num ${cssFor(perf.d30)}">${fmtPct(perf.d30)}</td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
    }

    function render() {
      const fund = activeFund();
      renderTabs();
      renderSummary(fund);
      renderHeatmap(fund);
      renderTable(fund);
    }

    search.addEventListener("input", event => {
      state.query = event.target.value;
      renderTable(activeFund());
    });
    perfFilter.addEventListener("change", event => {
      state.perfFilter = event.target.value;
      renderTable(activeFund());
    });

    fetch("data.json")
      .then(response => response.json())
      .then(data => {
        state.data = data;
        state.activeCode = data.funds[0]?.code;
        generated.textContent = fmtDateTime(data.generated_at_utc);
        render();
      })
      .catch(error => {
        generated.textContent = "Unable to load";
        tablePanel.className = "empty";
        tablePanel.textContent = `Could not load site/data.json: ${error.message}`;
      });
  </script>
</body>
</html>
