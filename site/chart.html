<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EasyETFs NAV History</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #647282;
      --line: #dde3ea;
      --accent: #0f766e;
      --accent-soft: #d9f0ed;
      --good: #0a7a3d;
      --bad: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }
    .wrap {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
    }
    .topbar {
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: 0;
    }
    main { padding: 20px 0 32px; }
    a { color: var(--accent); }
    .subtle { color: var(--muted); }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .tab {
      min-height: 38px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      border-radius: 8px;
      padding: 0 14px;
      font: inherit;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .tab[aria-selected="true"] {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #064e49;
      font-weight: 700;
    }
    .chart-panel, .empty {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .chart-panel { overflow: hidden; }
    .chart-head {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #f0f3f6;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .chart-title {
      margin: 0;
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 750;
    }
    .chart-value {
      font-size: 22px;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }
    .chart-body { padding: 14px; }
    canvas {
      display: block;
      width: 100%;
      height: min(58vh, 460px);
      min-height: 300px;
    }
    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 720px) {
      .topbar, .chart-head { display: block; }
      .chart-value { margin-top: 8px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1 id="title">Loading...</h1>
        <div id="subtitle" class="subtle"></div>
      </div>
      <a href="index.html">Back to holdings</a>
    </div>
  </header>

  <main class="wrap">
    <nav id="fundTabs" class="tabs" aria-label="Funds"></nav>
    <nav id="metricTabs" class="tabs" aria-label="Metrics"></nav>
    <section id="chartPanel" class="chart-panel">
      <div class="chart-head">
        <h2 id="chartTitle" class="chart-title">Chart</h2>
        <div id="latestValue" class="chart-value">n/a</div>
      </div>
      <div class="chart-body">
        <canvas id="chart" width="1000" height="460"></canvas>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const state = {
      data: null,
      fundCode: params.get("fund"),
      metric: params.get("metric") === "premium" ? "premium" : "nav",
    };

    const title = document.querySelector("#title");
    const subtitle = document.querySelector("#subtitle");
    const fundTabs = document.querySelector("#fundTabs");
    const metricTabs = document.querySelector("#metricTabs");
    const chartPanel = document.querySelector("#chartPanel");
    const chartTitle = document.querySelector("#chartTitle");
    const latestValue = document.querySelector("#latestValue");
    const canvas = document.querySelector("#chart");
    const ctx = canvas.getContext("2d");

    const fmtDateTime = value => value ? new Date(value).toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" }) : "n/a";
    const fmtZac = value => Number.isFinite(value) ? `ZAC ${value.toFixed(2)}` : "n/a";
    const fmtPct = value => Number.isFinite(value) ? `${value.toFixed(2)}%` : "n/a";

    function activeFund() {
      return state.data.funds.find(fund => fund.code === state.fundCode) || state.data.funds[0];
    }

    function hrefFor(fundCode, metric) {
      return `chart.html?fund=${encodeURIComponent(fundCode)}&metric=${encodeURIComponent(metric)}`;
    }

    function renderTabs() {
      fundTabs.innerHTML = state.data.funds.map(fund => `
        <a class="tab" href="${hrefFor(fund.code, state.metric)}" aria-selected="${fund.code === state.fundCode}">${fund.slug}</a>
      `).join("");
      metricTabs.innerHTML = [
        ["nav", "NAV price"],
        ["premium", "Premium/discount"],
      ].map(([metric, label]) => `
        <a class="tab" href="${hrefFor(state.fundCode, metric)}" aria-selected="${metric === state.metric}">${label}</a>
      `).join("");
    }

    function seriesFor(fund) {
      const rows = fund.nav_price_history || [];
      const key = state.metric === "premium" ? "difference_pct" : "nav_zac";
      return rows
        .map(row => ({
          date: row.captured_hour_utc,
          value: Number(row[key]),
        }))
        .filter(row => row.date && Number.isFinite(row.value));
    }

    function drawChart(points) {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * ratio));
      canvas.height = Math.max(1, Math.floor(rect.height * ratio));
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      const width = rect.width;
      const height = rect.height;
      const pad = { top: 18, right: 24, bottom: 42, left: 64 };
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, width, height);

      if (points.length < 1) return;
      const values = points.map(point => point.value);
      let min = Math.min(...values);
      let max = Math.max(...values);
      if (min === max) {
        min -= Math.abs(min || 1) * 0.02;
        max += Math.abs(max || 1) * 0.02;
      }
      const xFor = index => pad.left + (points.length === 1 ? 0 : (index / (points.length - 1)) * (width - pad.left - pad.right));
      const yFor = value => pad.top + ((max - value) / (max - min)) * (height - pad.top - pad.bottom);

      ctx.strokeStyle = "#dde3ea";
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i <= 4; i += 1) {
        const y = pad.top + (i / 4) * (height - pad.top - pad.bottom);
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
      }
      ctx.stroke();

      ctx.fillStyle = "#647282";
      ctx.font = "12px system-ui, sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let i = 0; i <= 4; i += 1) {
        const value = max - (i / 4) * (max - min);
        const label = state.metric === "premium" ? fmtPct(value) : fmtZac(value);
        const y = pad.top + (i / 4) * (height - pad.top - pad.bottom);
        ctx.fillText(label, pad.left - 8, y);
      }

      ctx.strokeStyle = "#0f766e";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      points.forEach((point, index) => {
        const x = xFor(index);
        const y = yFor(point.value);
        if (index === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();

      ctx.fillStyle = "#0f766e";
      points.forEach((point, index) => {
        const x = xFor(index);
        const y = yFor(point.value);
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.fillStyle = "#647282";
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillText(fmtDateTime(points[0].date), pad.left, height - pad.bottom + 14);
      ctx.textAlign = "right";
      ctx.fillText(fmtDateTime(points[points.length - 1].date), width - pad.right, height - pad.bottom + 14);
    }

    function render() {
      const fund = activeFund();
      state.fundCode = fund.code;
      const points = seriesFor(fund);
      const latest = points[points.length - 1];
      title.textContent = fund.name;
      subtitle.textContent = `${fund.code} hourly NAV and market-price history`;
      chartTitle.textContent = state.metric === "premium" ? "Estimated Premium/Discount to NAV" : "NAV Price";
      latestValue.textContent = latest ? (state.metric === "premium" ? fmtPct(latest.value) : fmtZac(latest.value)) : "n/a";
      renderTabs();
      if (!points.length) {
        chartPanel.className = "empty";
        chartPanel.textContent = "No hourly NAV/price history is available yet.";
        return;
      }
      chartPanel.className = "chart-panel";
      drawChart(points);
    }

    fetch(`data.json?ts=${Date.now()}`)
      .then(response => response.json())
      .then(data => {
        state.data = data;
        state.fundCode = state.fundCode || data.funds[0]?.code;
        render();
      })
      .catch(error => {
        title.textContent = "Unable to load";
        chartPanel.className = "empty";
        chartPanel.textContent = `Could not load site/data.json: ${error.message}`;
      });

    window.addEventListener("resize", () => {
      if (state.data) render();
    });
  </script>
</body>
</html>
